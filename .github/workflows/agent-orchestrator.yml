# .github/workflows/agent-orchestrator.yml
name: MLOps Autonomous Agent Execution Loop

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-agents:
    runs-on: ubuntu-latest
    
    # 🆕 THIS BLOCK FIXES THE 403 ERROR BY GRANTING WRITE ACCESS TO THE RUNNER
    permissions:
      contents: write

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Set up Python Runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install snowflake-connector-python boto3 pyyaml

    - name: Execute Autonomous MLOps Supervisor
      env:
        PYTHONPATH: .
        SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
        SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      run: |
        python agents/supervisor.py

    - name: GitOps Auto-Commit Agent Changes to DailyLog.md
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action [MLOps Agent]"
        
        git add DailyLog.md
        if ! git diff --cached --quiet; then
          git commit -m "chore: autonomous agent execution tracking update [skip ci]"
          git push origin main
        else
          echo "No structural state updates written to DailyLog.md today."
        fi